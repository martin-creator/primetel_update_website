services:
  - type: web
    name: primetel
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn primetel_website.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: primetel.onrender.com,health.primetel.tech
      - key: CSRF_TRUSTED_ORIGINS
        value: https://primetel.onrender.com,https://health.primetel.tech
      - key: DATABASE_URL
        sync: false
      - key: GA_MEASUREMENT_ID
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_S3_ACCESS_KEY
        sync: false
      - key: SUPABASE_S3_SECRET_KEY
        sync: false
      - key: SUPABASE_BUCKET
        sync: false
